name: "[Reusable] Docker Build & Push"

on:
  workflow_call:
    inputs:
      app:
        description: "Application name (backend | frontend | docs)"
        required: true
        type: string
      image_name:
        description: "Full GHCR image name (e.g. ghcr.io/owner/trading-backend)"
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile"
        required: true
        type: string
      changed:
        description: "Whether the app's source files changed (from detect-changes)"
        required: true
        type: string
      event_name:
        description: "The triggering event name"
        required: true
        type: string
      api_url:
        description: "Frontend API URL (only used when app == frontend)"
        required: false
        type: string
        default: "http://localhost:3000"
    # secrets: inherit digunakan di caller — GITHUB_TOKEN tidak bisa
    # dideklarasikan di sini karena merupakan nama yang direservasi GitHub.

jobs:
  docker-push:
    name: Build & Push (${{ inputs.app }})
    runs-on: ubuntu-latest
    if: inputs.changed == 'true' || inputs.event_name == 'release'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and Push (with build-arg — frontend only)
        if: inputs.app == 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          build-args: |
            FE_VITE_API_URL=${{ inputs.api_url }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push
        if: inputs.app != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
