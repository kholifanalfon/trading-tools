name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development
      - test
  pull_request:
    branches:
      - main
      - development
      - test

# Permissions needed to write packages (images) to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Applications
        run: |
          bun --cwd apps/backend type-check
          bun --cwd apps/frontend run build
          bun --cwd apps/docs run build

  deploy-development:
    needs: build-and-test
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Development Images
        run: |
          # Convert repository owner name to lowercase (GHCR requires lowercase owner)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "🐳 Building Docker images for Development..."
          docker build -t ghcr.io/$OWNER/trading-backend:dev -f docker/backend/Dockerfile .
          docker build --build-arg FE_VITE_API_URL=${{ vars.DEV_FE_VITE_API_URL || 'http://localhost:3000' }} -t ghcr.io/$OWNER/trading-frontend:dev -f docker/frontend/Dockerfile .
          docker build -t ghcr.io/$OWNER/trading-docs:dev -f docker/docs/Dockerfile .

          echo "🚀 Pushing images to GHCR..."
          docker push ghcr.io/$OWNER/trading-backend:dev
          docker push ghcr.io/$OWNER/trading-frontend:dev
          docker push ghcr.io/$OWNER/trading-docs:dev

  deploy-testing:
    needs: build-and-test
    if: github.ref == 'refs/heads/test' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Testing/Staging Images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "🐳 Building Docker images for Testing/Staging..."
          docker build -t ghcr.io/$OWNER/trading-backend:test -f docker/backend/Dockerfile .
          docker build --build-arg FE_VITE_API_URL=${{ vars.TEST_FE_VITE_API_URL || 'http://localhost:3000' }} -t ghcr.io/$OWNER/trading-frontend:test -f docker/frontend/Dockerfile .
          docker build -t ghcr.io/$OWNER/trading-docs:test -f docker/docs/Dockerfile .

          echo "🚀 Pushing images to GHCR..."
          docker push ghcr.io/$OWNER/trading-backend:test
          docker push ghcr.io/$OWNER/trading-frontend:test
          docker push ghcr.io/$OWNER/trading-docs:test

  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Production Images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "🐳 Building Docker images for Production..."
          docker build -t ghcr.io/$OWNER/trading-backend:latest -t ghcr.io/$OWNER/trading-backend:prod -f docker/backend/Dockerfile .
          docker build --build-arg FE_VITE_API_URL=${{ vars.PROD_FE_VITE_API_URL || 'http://localhost:3000' }} -t ghcr.io/$OWNER/trading-frontend:latest -t ghcr.io/$OWNER/trading-frontend:prod -f docker/frontend/Dockerfile .
          docker build -t ghcr.io/$OWNER/trading-docs:latest -t ghcr.io/$OWNER/trading-docs:prod -f docker/docs/Dockerfile .

          echo "🚀 Pushing images to GHCR..."
          docker push ghcr.io/$OWNER/trading-backend:latest
          docker push ghcr.io/$OWNER/trading-frontend:latest
          docker push ghcr.io/$OWNER/trading-docs:latest
