name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development
      - test
  pull_request:
    branches:
      - main
      - development
      - test
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Code Quality & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          cache: true

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Applications
        run: |
          bun run --cwd apps/backend type-check
          bun run --cwd apps/frontend build
          bun run --cwd apps/docs build

  codeql-analysis:
    name: CodeQL Advanced Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality # Peningkatan rule set deteksi

      # Menjalankan autobuild. Untuk JS/TS, CodeQL biasanya tidak membutuhkan proses kompilasi native
      - name: Autobuild CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # JOB BARU: Mendeteksi bagian mana yang berubah
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'docker/backend/**'
              - 'package.json'
              - 'bun.lockb'
            frontend:
              - 'apps/frontend/**'
              - 'docker/frontend/**'
              - 'package.json'
              - 'bun.lockb'
            docs:
              - 'apps/docs/**'
              - 'docker/docs/**'
              - 'package.json'
              - 'bun.lockb'

  build-and-push-images:
    name: Build & Push Docker Images
    needs: [build-and-test, changes, codeql-analysis]
    if: github.event_name == 'release' || (github.event_name == 'push' && contains(fromJSON('["refs/heads/development", "refs/heads/test"]'), github.ref))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Environment Variables
        id: env-config
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "api_url=${{ vars.PROD_FE_VITE_API_URL || 'http://localhost:3000' }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            echo "api_url=${{ vars.TEST_FE_VITE_API_URL || 'http://localhost:3000' }}" >> $GITHUB_OUTPUT
          else
            echo "api_url=${{ vars.DEV_FE_VITE_API_URL || 'http://localhost:3000' }}" >> $GITHUB_OUTPUT
          fi

      # ==========================
      # STRATEGI BUILD BERSYARAT
      # ==========================

      # 1. BACKEND
      - name: Extract Docker metadata for Backend
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'release'
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trading-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and Push Backend
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'release'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. FRONTEND
      - name: Extract Docker metadata for Frontend
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'release'
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trading-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and Push Frontend
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'release'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          build-args: |
            FE_VITE_API_URL=${{ steps.env-config.outputs.api_url }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. DOCS
      - name: Extract Docker metadata for Docs
        if: needs.changes.outputs.docs == 'true' || github.event_name == 'release'
        id: meta-docs
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trading-docs
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and Push Docs
        if: needs.changes.outputs.docs == 'true' || github.event_name == 'release'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/docs/Dockerfile
          push: true
          tags: ${{ steps.meta-docs.outputs.tags }}
          labels: ${{ steps.meta-docs.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
