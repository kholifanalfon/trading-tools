name: "[Reusable] Detect Changes"

on:
  workflow_call:
    outputs:
      backend:
        description: "True if backend files changed"
        value: ${{ jobs.detect-changes.outputs.backend }}
      frontend:
        description: "True if frontend files changed"
        value: ${{ jobs.detect-changes.outputs.frontend }}
      docs:
        description: "True if docs files changed"
        value: ${{ jobs.detect-changes.outputs.docs }}

# Opt-in ke Node.js 24 agar kompatibel dengan GitHub Actions runner terbaru
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'docker/backend/**'
              - 'package.json'
              - 'bun.lockb'
            frontend:
              - 'apps/frontend/**'
              - 'docker/frontend/**'
              - 'package.json'
              - 'bun.lockb'
            docs:
              - 'apps/docs/**'
              - 'docker/docs/**'
              - 'package.json'
              - 'bun.lockb'
