name: "CI — Pull Request Gate"

# ============================================================
# Trigger: Setiap PR ke branch utama
# Tujuan : Validasi kode SEBELUM merge. DILARANG deploy apapun.
# Note   : CodeQL ditangani terpisah oleh on-codeql.yml
# ============================================================

on:
  pull_request:
    branches:
      - main
      - development
      - test

# Batalkan run lama jika ada commit baru di PR yang sama
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt-in ke Node.js 24 agar kompatibel dengan GitHub Actions runner terbaru
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # Build & Type Check — harus hijau sebelum PR bisa di-merge
  build-and-test:
    name: Code Quality & Build
    uses: ./.github/workflows/_reusable-build-test.yml
