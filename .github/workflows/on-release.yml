name: "CD — Release (Deploy Production)"

# ============================================================
# Trigger: Release di-publish via GitHub UI
# Tujuan : Deploy image berversi ke production
# Note   : Image sudah ada dari on-push-tag.yml
#          Job ini TIDAK rebuild image — langsung deploy
#          Menggunakan GitHub Environment "production" untuk
#          approval gate manual sebelum deploy berjalan
# ============================================================

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: read

jobs:
  # Deploy ke production — membutuhkan approval manual
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest

    # ⚠️ WAJIB: Aktifkan GitHub Environment "production" di:
    #   Settings → Environments → production → Required reviewers
    # Job ini akan PAUSE dan menunggu persetujuan sebelum berjalan
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Extract Release Tag
        id: tag
        run: echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy and Start Services via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.TARGET_DIR || '~/' }}
            git fetch --all --tags
            git checkout ${{ github.event.release.tag_name }}
            docker compose build
            docker compose up -d

      - name: Notify Deployment Success
        run: |
          echo "✅ Production deployment of ${{ steps.tag.outputs.version }} complete!"
